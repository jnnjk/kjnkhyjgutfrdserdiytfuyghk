<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
 
</head>
<body>
    <style>
        * {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

body {
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(135deg, #e9eef5, #f8f8f8);
  min-height: 100vh;
}

.app {
  min-height: 100vh;
  display: grid;
  place-items: center;
}

.card {
  width: 360px;
  background-color: #ffffff;
  padding: 24px;
  border-radius: 14px;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
}

h2 {
  text-align: center;
  margin-bottom: 18px;
  color: #222;
}

.task-form {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  margin-bottom: 18px;
}

#newTask {
  padding: 11px;
  border: 1px solid #bbb;
  border-radius: 8px;
  outline: none;
}

#newTask:focus {
  border-color: #333;
}

#saveTask {
  padding: 11px 16px;
  border: 0;
  border-radius: 8px;
  background-color: #1f2937;
  color: white;
  cursor: pointer;
}

#saveTask:hover {
  background-color: #374151;
}

.task-item {
  background-color: #f1f3f5;
  padding: 11px;
  border-radius: 8px;
  margin-bottom: 9px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.task-item.finished {
  color: #777;
  text-decoration: line-through;
  background-color: #e2e8f0;
}

.remove-btn {
  border: 0;
  border-radius: 6px;
  background-color: #dc2626;
  color: white;
  padding: 6px 9px;
  cursor: pointer;
}

.remove-btn:hover {
  background-color: #b91c1c;
}
    </style>

  <main class="app">
    <section class="card">
      <h2>My Tasks</h2>

      <div class="task-form">
        <input id="newTask" type="text" placeholder="Write something...">
        <button id="saveTask">Save</button>
      </div>

      <div id="tasksArea"></div>
    </section>
  </main>

  <script>
   const inputBox = document.querySelector("#newTask");
const saveButton = document.querySelector("#saveTask");
const tasksArea = document.querySelector("#tasksArea");

saveButton.onclick = createTask;

inputBox.onkeydown = function(event) {
  if (event.key === "Enter") {
    createTask();
  }
};

function createTask() {
  let value = inputBox.value.trim();

  if (!value) {
    inputBox.focus();
    return;
  }

  let taskDiv = document.createElement("div");
  let taskText = document.createElement("span");
  let removeButton = document.createElement("button");

  taskDiv.className = "task-item";
  taskText.innerText = value;
  removeButton.innerText = "X";
  removeButton.className = "remove-btn";

  taskDiv.onclick = function() {
    taskDiv.classList.toggle("finished");
  };

  removeButton.onclick = function(event) {
    event.stopPropagation();
    taskDiv.remove();
  };

  taskDiv.append(taskText, removeButton);
  tasksArea.appendChild(taskDiv);

  inputBox.value = "";
  inputBox.focus();
}
  </script>
</body>
</html>
